<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel | NovaTrust</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial,sans-serif; background:#f4f6f8 }
header { background:#b31b1b; color:#fff; padding:18px 30px; font-size:20px }
.wrapper { display:flex }
.sidebar { width:230px; background:#1f1f1f; min-height:100vh; padding:20px; color:#fff }
.sidebar a { display:block; color:#ccc; padding:12px; text-decoration:none; border-radius:6px; margin-bottom:8px }
.sidebar a:hover { background:#333; color:#fff }
.main { flex:1; padding:30px }

.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; margin-bottom:30px }
.stat { background:#fff; padding:20px; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.08) }

table { width:100%; background:#fff; border-collapse:collapse; margin-bottom:40px }
th,td { padding:14px; border-bottom:1px solid #eee }
th { background:#f0f0f0 }

button { padding:6px 10px; border:none; border-radius:4px; cursor:pointer }
.approve { background:#2e7d32; color:#fff }
.decline { background:#c62828; color:#fff }
.send { background:#1565c0; color:#fff }
.take { background:#ef6c00; color:#fff }

.log { background:#fff; padding:12px; border-radius:6px; margin-bottom:10px }
</style>
</head>

<body>

<header>NovaTrust Admin Dashboard</header>

<div class="wrapper">

<div class="sidebar">
  <h3>Admin</h3>
  <a href="#users">Users</a>
  <a href="#transfers">Pending Transfers</a>
  <a href="../index.html">Logout</a>
</div>

<div class="main">

<!-- STATS -->
<div class="stats">
  <div class="stat"><h2 id="totalUsers">0</h2><p>Total Users</p></div>
  <div class="stat"><h2 id="approvedUsers">0</h2><p>Approved Users</p></div>
  <div class="stat"><h2 id="pendingUsers">0</h2><p>Pending Users</p></div>
</div>

<!-- USERS -->
<h2 id="users">Users</h2>
<table>
<thead>
<tr>
<th>Name</th><th>Email</th><th>Status</th><th>Balance</th><th>Actions</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

<!-- TRANSFERS -->
<h2 id="transfers">Pending Transfers</h2>
<table>
<thead>
<tr>
<th>Email</th><th>Method</th><th>Amount</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody id="transferTable"></tbody>
</table>

<!-- LOGS -->
<h2>Activity Logs</h2>
<div id="logBox"></div>

</div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
let transfers = JSON.parse(localStorage.getItem("pendingTransfers")) || [];
let logs = JSON.parse(localStorage.getItem("activityLogs")) || [];

const userTable = document.getElementById("userTable");
const transferTable = document.getElementById("transferTable");
const logBox = document.getElementById("logBox");

function render() {

  // STATS
  totalUsers.innerText = users.length;
  approvedUsers.innerText = users.filter(u=>u.status==="Approved").length;
  pendingUsers.innerText = users.filter(u=>u.status==="Pending Approval").length;

  // USERS
  userTable.innerHTML = "";
  users.forEach(u=>{
    userTable.innerHTML += `
    <tr>
      <td>${u.firstName} ${u.lastName}</td>
      <td>${u.email}</td>
      <td>${u.status}</td>
      <td>$${u.balance}</td>
      <td>
        <button class="approve" onclick="approveUser('${u.email}')">Approve</button>
        <button class="send" onclick="adjust('${u.email}',50000)">+50000</button>
        <button class="take" onclick="adjust('${u.email}',-20000)">-20000</button>
      </td>
    </tr>`;
  });

  // TRANSFERS
  transferTable.innerHTML = "";
  transfers.forEach(t=>{
    transferTable.innerHTML += `
    <tr>
      <td>${t.userEmail}</td>
      <td>${t.method}</td>
      <td>$${t.amount}</td>
      <td>${t.status}</td>
      <td>
        <button class="approve" onclick="approveTransfer('${t.id}')">Approve</button>
        <button class="decline" onclick="declineTransfer('${t.id}')">Decline</button>
      </td>
    </tr>`;
  });

  // LOGS
  logBox.innerHTML = "";
  logs.slice(0,10).forEach(l=>{
    logBox.innerHTML += `<div class="log">${l.time} — ${l.action}</div>`;
  });
}

function approveUser(email){
  const u = users.find(x=>x.email===email);
  if(!u) return;
  u.status="Approved";
  log(`Approved user ${email}`);
  save();
}

function adjust(email,amount){
  const u = users.find(x=>x.email===email);
  if(!u) return;
  u.balance += amount;
  log(`Adjusted $${amount} for ${email}`);
  save();
}

function approveTransfer(id) {
  id = Number(id); // ✅ FORCE NUMBER

  let transfers = JSON.parse(localStorage.getItem("pendingTransfers")) || [];
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

  const t = transfers.find(x => Number(x.id) === id);
  if (!t) {
    alert("Transfer not found");
    console.error("Looking for ID:", id);
    console.error("Available transfers:", transfers);
    return;
  }

  const u = users.find(x => x.email === t.userEmail);
  if (!u) {
    alert("No user found for this transfer");
    return;
  }

  if (u.balance < t.amount) {
    alert("Insufficient balance");
    return;
  }

  // deduct balance
  u.balance -= Number(t.amount);

  // save to history
  let history = JSON.parse(localStorage.getItem("transactionHistory")) || [];
  history.unshift({
    ...t,
    status: "Approved"
  });

  // remove from pending
  transfers = transfers.filter(x => Number(x.id) !== id);

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("pendingTransfers", JSON.stringify(transfers));
  localStorage.setItem("transactionHistory", JSON.stringify(history));

  alert("Transfer approved");
  render();
}


function declineTransfer(id){
  transfers = transfers.filter(x=>x.id!==id);
  log("Declined transfer");
  saveAll();
}

function log(action){
  logs.unshift({action,time:new Date().toLocaleString()});
}

function save(){
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("activityLogs",JSON.stringify(logs));
  render();
}

function saveAll(){
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("pendingTransfers",JSON.stringify(transfers));
  localStorage.setItem("activityLogs",JSON.stringify(logs));
  render();
}

render();
</script>

</body>
</html>
