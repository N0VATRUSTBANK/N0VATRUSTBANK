<body>

<header class="top-header">
  <h2>Transaction Receipt</h2>
</header>

<main class="main-content">

  <div class="receipt-box">
    <p><strong>Type:</strong> <span id="type"></span></p>
    <p><strong>Amount:</strong> $<span id="amount"></span></p>
    <p><strong>Status:</strong> <span id="status"></span></p>
    <p><strong>Date:</strong> <span id="date"></span></p>
  </div>

  <a href="dashboard.html" class="btn">Back to Dashboard</a>

</main>

<script>
const receipt = JSON.parse(localStorage.getItem("selectedReceipt"));

if (receipt) {
  document.getElementById("type").innerText = receipt.method;
  document.getElementById("amount").innerText = receipt.amount;
  document.getElementById("status").innerText = receipt.status;
  document.getElementById("date").innerText = receipt.date;
}
</script>

</body>
