<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Credit Card Pre-Approval | NovaTrust Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/dashboard.css">

  <style>
    .preapproval-box {
      max-width: 520px;
      margin: auto;
    }

    .step {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    .step h3 {
      margin-bottom: 15px;
    }

    .step input,
    .step select {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #b31b1b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #8f1515;
    }

    .result {
      display: none;
      text-align: center;
      padding: 30px;
    }

    .approved { color: #1b8f3a; }
    .denied { color: #c62828; }

    .card-preview {
      margin: 20px auto;
      width: 300px;
      height: 180px;
      border-radius: 16px;
      padding: 20px;
      background: linear-gradient(135deg, #2c2c2c, #111);
      color: #fff;
      box-shadow: 0 15px 30px rgba(0,0,0,.25);
      text-align: left;
    }

    .card-preview h4 { margin-bottom: 40px; }
    .card-preview span { font-size: 13px; opacity: .9; }

    .disclaimer {
      font-size: 12px;
      opacity: .7;
      margin-top: 10px;
    }
  </style>
</head>

<body>
<script src="../assets/js/auth-guard.js"></script>

<!-- HEADER -->
<header class="top-header">
  <button class="menu-btn" id="menuBtn">☰</button>
  <div class="header-right">
    <span class="welcome-text">Credit Card Pre-Approval</span>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <h2 class="bank-name">NovaTrust</h2>
  <a href="public/credit-cards.html">Credit Cards</a>
  <a href="public/loans.html">Loans</a>
  <a href="public/support.html">Support</a>
  <a href="../index.html">HOME</a>
</nav>

<!-- MAIN -->
<main class="main-content">
  <div class="preapproval-box">

    <div class="step">
      <h3>Check Your Credit Card Pre-Approval</h3>
      <p style="font-size:14px;opacity:.8;">
        This will not affect your credit score.
      </p>
    </div>

    <div class="step" id="formStep">
      <h3>Your Information</h3>

      <input id="income" type="number" placeholder="Annual Income (USD)">
      <select id="employment">
        <option value="">Employment Status</option>
        <option>Employed</option>
        <option>Self-Employed</option>
        <option>Student</option>
        <option>Unemployed</option>
      </select>

      <select id="creditScore">
        <option value="">Estimated Credit Score</option>
        <option value="excellent">Excellent (720+)</option>
        <option value="good">Good (680–719)</option>
        <option value="fair">Fair (620–679)</option>
        <option value="poor">Below 620</option>
      </select>

      <button class="submit-btn" id="checkBtn">Check Pre-Approval</button>
    </div>

    <div class="step result" id="resultStep"></div>

  </div>
</main>

<script src="../assets/js/dashboard.js"></script>

<script>
const user = JSON.parse(localStorage.getItem("loggedInUser"));
if (!user) window.location.href = "../index.html";

document.getElementById("checkBtn").onclick = () => {
  const income = Number(document.getElementById("income").value);
  const score = document.getElementById("creditScore").value;

  if (!income || !score) {
    alert("Please complete all fields");
    return;
  }

  const approved = income >= 30000 && score !== "poor";
  const resultBox = document.getElementById("resultStep");

  document.getElementById("formStep").style.display = "none";
  resultBox.style.display = "block";

  if (approved) {
    const limit =
      score === "excellent" ? 15000 :
      score === "good" ? 8000 :
      3000;

    user.preapprovedCard = {
      type: "NovaTrust Platinum",
      limit,
      balance: 0,
      approvedDate: new Date().toLocaleDateString()
    };

    localStorage.setItem("loggedInUser", JSON.stringify(user));

    resultBox.innerHTML = `
      <h2 class="approved">You're Pre-Approved!</h2>

      <div class="card-preview">
        <h4>NOVATRUST PLATINUM</h4>
        <span>Pre-Approved Limit</span>
        <h3>$${limit.toLocaleString()}</h3>
      </div>

      <button class="submit-btn" onclick="location.href='login.html'">
        View My Credit Cards
      </button>

      <p class="disclaimer">Final approval subject to verification.</p>
    `;
  } else {
    resultBox.innerHTML = `
      <h2 class="denied">Not Approved at This Time</h2>
      <p>You may improve eligibility by increasing income or credit history.</p>

      <button class="submit-btn" onclick="location.href='index.html'">
        Return to Dashboard
      </button>
    `;
  }
};
</script>

</body>
</html>
