<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account | NovaTrust</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
    }

    header {
      background: #b31b1b;
      color: white;
      padding: 18px 30px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 480px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,.1);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      font-size: 14px;
      margin-top: 12px;
      display: block;
      color: #444;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input[type="file"] {
      padding: 8px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background: #b31b1b;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #8f1515;
    }

    .login-link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .login-link a {
      color: #b31b1b;
      text-decoration: none;
      font-weight: bold;
    }

    .exit-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #f2f2f2;
      color: #444;
      text-align: center;
      line-height: 34px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      transition: .2s;
    }

    .exit-btn:hover {
      background: #e6e6e6;
      color: #b31b1b;
    }

  </style>
</head>

<body>

<header>NovaTrust Bank</header>

<div class="container">
<a href="index.html" class="exit-btn">✕</a>

  <h2>Create Your Account</h2>

  <label>First Name</label>
  <input id="firstName" placeholder="First Name">

  <label>Middle Name</label>
  <input id="middleName" placeholder="Middle Name (optional)">

  <label>Last Name</label>
  <input id="lastName" placeholder="Last Name">

 <label>Address</label>
  <input id="ssn" placeholder=" Address">

   <label>Country</label>
  <input id="Country" placeholder="United states">

   <label>State/province</label>
  <input id="state/province" placeholder="Enter state or province">

 <label>City</label>
  <input id="City" placeholder="Enter City">

   <label>zip code</label>
  <input id="zip code" placeholder="zip code/ postal code">

 <label>Date of Birth</label>
  <input id="Date of Bith" placeholder="MM/DD/YYYY">

 <label>House Address</label>
  <input id="House address" placeholder="House address">

 <label>Phone Number</label>
  <input id="Phone number" placeholder="Phone Number">

  <label>Email</label>
  <input id="email" type="email" placeholder="Email address">

  <label>Password</label>
  <input id="password" type="password" placeholder="Create password">

<label>Confirm-Password</label>
<input id="Confirm-password" type="password" placeholder="Confirm password">

<label>2FA PIN</label>
<input id="2FA PIN" type="password" placeholder="2FA PIN">

<label>Account Type</label>
  <input id="Account Type" type="password" placeholder=" Savings/Current">


  <label>SSN</label>
  <input id="ssn" placeholder="XXX-XX-XXXX">

  <label>Government ID</label>
  <input id="govId" placeholder="ID Number">

  <label>Upload Profile Picture</label>
  <input id="photo" type="file" accept="image/*">

  <button onclick="registerUser()">Create Account</button>

  <div class="login-link">
    Already have an account?
    <a href="index.html">Login</a>
  </div>
</div>

<script>
function registerUser() {

  const user = {
    id: Date.now(),
    firstName: firstName.value.trim(),
    middleName: middleName.value.trim(),
    lastName: lastName.value.trim(),
    email: email.value.trim(),
    password: password.value,
    ssn: ssn.value,
    govId: govId.value,
    balance: 0,
    status: "Pending Approval",
    createdAt: new Date().toLocaleString(),
    lastActive: "Never"
  };

  if (!user.firstName || !user.lastName || !user.email || !user.password) {
    alert("Please fill all required fields");
    return;
  }

  // ✅ FIX: properly load users
  let users = JSON.parse(localStorage.getItem("users")) || [];

  // prevent duplicate email
  if (users.find(u => u.email === user.email)) {
    alert("An account with this email already exists");
    return;
  }

  users.push(user);
  localStorage.setItem("users", JSON.stringify(users));

  alert(
    "Account created successfully.\n\n" +
    "Your account is pending approval.\n" +
    "A verification email has been sent."
  );

  // redirect to login
  window.location.href = "index.html";
}
</script>



</body>
</html>
